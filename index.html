<body data-spy="scroll" data-target=".top-menu" data-offset="50">

                    <ul class="top-menu">

    <header class="header-descr">
        <div class="container">

                            <h1 class="header-descr__title">Web development project</h1>

    <a href="#" class="scrollup">Наверх</a>

    <!-- <script src="./js/jquery-3.3.1.min.js"></script> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/main.js"></script>
    <script type="text/javascript">
        $(document).ready(function () {

            $(window).scroll(function () {
                if ($(this).scrollTop() > 600) {
                    $('.scrollup').fadeIn();
                } else {
                    $('.scrollup').fadeOut();
                }
            });

            $('.scrollup').click(function () {
                $("html, body").animate({ scrollTop: 0 }, 600);
                return false;
            });

        });

        $(document).ready(function () {
            $('.slider').slick({
                slidesToShow: 3,
                slidesToScroll: 1,
                autoplay: true,
                autoplaySpeed: 3000,
                arrows: true,
                nextArrow: '<i class="fas fa-angle-double-right" aria-hidden="true"></i>',
                prevArrow: '<i class="fas fa-angle-double-left" aria-hidden="true"></i>',
                dots: false,
                adaptiveHeight: true,

                // slider responsivo
                responsive: [
                    {
                        breakpoint: 1121,
                        settings: {
                            slidesToShow: 2,
                            autoplay: true,
                            adaptiveHeight: true,
                        }
                    },

                    {
                        breakpoint: 768,
                        settings: {
                            slidesToShow: 1,
                            autoplay: true,
                            adaptiveHeight: true,
                        }
                    }
                ]

            });

        });
    </script>
